<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TodoList</title>
  </head>
  <body>
    <!-- <header><div>TODO LIST</div></header> -->

    <div class="sidebar">
      <div class="addbar"><div>+</div></div>
      <div class="projectlist"></div>
    </div>
    <div class="content">
      <div class="addtodobar">
        <select name="sort" id="sort">
          <option value="bypriority">Sort by priority</option>
          <option value="bydates">Sort by dates</option>
        </select>
        <div>+</div>
      </div>
      <div class="todolist"></div>
    </div>


    <dialog class="addTodoForm toDoDialog">
      <div class="todoTitle">
        <input type="text" placeholder="Title" name="title" class="todoTitle" />
      </div>
      <div class="todoDescription">
        <input
          type="text"
          placeholder="Something that describe this todo"
          name="description"
          class="todoDescription"
        />
      </div>
      <div class="todoDueDate">
        <input type="date" name="duedate" class="todoDueDate" />
      </div>
      <div class="todoPriority">
        <input
          type="number"
          min="1"
          max="10"
          name="priority"
          class="todoPriority"
        />
      </div>

      <textarea
        type="text"
        placeholder="Title"
        name="notes"
        class="todoNotes"
      ></textarea>

      <button class="addTodo">Add</button>
      <button class="closeForm">Close</button>
    </dialog>
    
    <dialog class="addProjectForm">
      <div>
        <label for="name">Project Name:</label>
        <input type="text" name="Name" />
      </div>
      <button class="addProject">Add Project</button>
      <button class="closeForm">Close</button>
    </dialog>
  </body>
</html>
